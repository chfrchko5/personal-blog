<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <ul>
        {% for article in articles %}
            <li>
                Article: {{ article.id }} -
                Title: {{ article.title }}

                <a href="{{ url_for('edit_article', id=article.id) }}" target="_self" rel="noopener noreferrer">
                    <button type="button">Edit Article</button>
                </a>

                <form method="POST" action="{{ url_for('delete_article', id=article.id) }}" onsubmit="return confirmDelete();">
                    <button type="submit">Delete Article</button>
                </form>
            </li>
        {% endfor %}
    </ul>

    <a href="{{ url_for('new_article') }}" target="_self" rel="noopener noreferrer">
        <button type="button">New Article</button>
    </a>
    
    <h4><a href="{{ url_for('guest_page') }}">Home Page</a></h4>

    <script>
        function confirmDelete() {
            return confirm("Are you sure you want to delete this article?");
        }
</script>
</body>
