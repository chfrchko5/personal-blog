<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
</head>
<body>
    <h1>My Personal Blog</h1>
    <p>
        {% for article in articles %}
            <li>
                Article: {{ article.id }} -
                Title: {{ article.title }}
                Date: {{ article.date }}
            </li>
        {% endfor %}
    </p>

    <h4><a href="{{ url_for('admin_page') }}">Admin Dashboard</a></h4>
</body>
